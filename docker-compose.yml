# ============================================================
# OpenClaw – Empleado Digital Personal
# docker-compose.yml para EasyPanel / Deploy local
# ============================================================
#
# NO se exponen puertos por defecto.
# En EasyPanel el reverse proxy se encarga de enrutar el tráfico.
# Para acceso local directo, descomentá la sección "ports" de openclaw.
#
# Uso rápido:
#   cp .env.example .env   # editar credenciales
#   docker compose up -d --build
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-openclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # OpenClaw – Agente IA (Empleado Digital)
  # ----------------------------------------------------------
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- Base de datos ---
      DATABASE_URL: ${DATABASE_URL:-postgresql://openclaw:changeme_secure_password@postgres:5432/openclaw}
      # --- Timezone ---
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
      # --- LLM API Key (ej: OpenAI, Anthropic, etc.) ---
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      # --- Modelo preferido ---
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-}
      # --- Puerto interno (no cambiar salvo que la imagen lo requiera) ---
      OPENCLAW_PORT: ${OPENCLAW_PORT:-18789}
    volumes:
      # Configuración y memoria del agente
      - openclaw_data:/root/.openclaw
      # Workspace persistente (venv, node, logs, archivos del usuario)
      - openclaw_workspace:/workspace
    # --- Puertos ---
    # DESCOMENTÁ las líneas siguientes SOLO si necesitás acceso directo
    # sin reverse proxy (NO recomendado en EasyPanel):
    # ports:
    #   - "${HOST_PORT:-18789}:18789"

volumes:
  postgres_data:
    driver: local
  openclaw_data:
    driver: local
  openclaw_workspace:
    driver: local
